{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <h1>CREATE INCIDENT</h1>
  <h2>新增 Incident</h2>
  <p>帶有星號的欄位必須填寫，表單使用 POST 方式送出。</p>
</div>

<div class="form-container">
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">新增事件</button>
      <a href="{% url 'home' %}" class="btn btn-secondary">返回首頁</a>
    </div>
  </form>
</div>
{% endblock %}
