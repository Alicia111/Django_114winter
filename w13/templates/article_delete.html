{% extends "base.html" %}

{% block title %}Delete Article{% endblock title %}

{% block content %}
<h1>Delete Article</h1>
<p>Are you sure you want to delete "{{ article.title }}"?</p>
<form method="post">
  {% csrf_token %}
  <button type="submit">Confirm Delete</button>
</form>
<p><a href="{{ article.get_absolute_url }}">Cancel</a></p>
{% endblock content %}
