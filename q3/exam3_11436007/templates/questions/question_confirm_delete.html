{% extends '_base.html' %}
{% block content %}
<h2>Delete Question</h2>
<p>Are you sure you want to delete <strong>{{ question.title }}</strong>?</p>
<form method="post">
  {% csrf_token %}
  <button type="submit">Yes, Delete</button>
  <a href="/questions/{{ question.pk }}/">Cancel</a>
</form>
{% endblock %}
