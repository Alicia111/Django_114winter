{% extends '_base.html' %}
{% block content %}
<h2>Open Questions</h2>
{% if questions %}
<table>
  <tr><th>Title</th><th>Author</th><th>Category</th><th>Course Code</th></tr>
  {% for q in questions %}
  <tr>
    <td><a href="/questions/{{ q.pk }}/">{{ q.title }}</a></td>
    <td>{{ q.author.username }}</td>
    <td>{{ q.category }}</td>
    <td>{{ q.course_code }}</td>
  </tr>
  {% endfor %}
</table>
{% else %}
<p>No open questions.</p>
{% endif %}
{% endblock %}
